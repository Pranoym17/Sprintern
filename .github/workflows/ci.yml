name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: sprintern_test
          POSTGRES_USER: sprintern
          POSTGRES_PASSWORD: sprintern_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U sprintern -d sprintern_test"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://sprintern:sprintern_test@localhost:5432/sprintern_test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[dev]"
      - run: alembic upgrade head
      - run: ruff check api tests migrations
      - run: mypy api
      - run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_URL: https://api.example.test
      NEXT_PUBLIC_SUPABASE_URL: https://project.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: test-public-anon-key
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  production-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: docker build -f Dockerfile.api -t sprintern-api:ci .
      - run: >-
          docker build -f Dockerfile.web
          --build-arg NEXT_PUBLIC_API_URL=https://api.example.test
          --build-arg NEXT_PUBLIC_SUPABASE_URL=https://project.supabase.co
          --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=test-public-key
          -t sprintern-web:ci .
