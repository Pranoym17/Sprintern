name: Backend

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: sprintern_test
          POSTGRES_USER: sprintern
          POSTGRES_PASSWORD: sprintern_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U sprintern -d sprintern_test"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://sprintern:sprintern_test@localhost:5432/sprintern_test
      UNSUBSCRIBE_SIGNING_SECRET: ci-only-signing-secret-at-least-32-characters
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[dev]"
      - run: alembic upgrade head
      - run: ruff check api tests migrations scripts
      - run: mypy api scripts
      - run: pytest -q
      - run: docker build -f Dockerfile.api -t sprintern-api:ci .
