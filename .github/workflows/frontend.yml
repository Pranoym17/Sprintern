name: Frontend

on:
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_PUBLIC_API_URL: https://api.example.test/api/v1
      PUBLIC_API_URL: https://api.example.test/api/v1
      NEXT_PUBLIC_SUPABASE_URL: https://project.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: test-public-anon-key
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - run: npm run build
      - run: >-
          docker build -f Dockerfile.web
          --build-arg NEXT_PUBLIC_API_URL=https://api.example.test/api/v1
          --build-arg NEXT_PUBLIC_SUPABASE_URL=https://project.supabase.co
          --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=test-public-key
          -t sprintern-web:ci .
