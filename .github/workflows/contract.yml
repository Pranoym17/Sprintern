name: API contract

on:
  pull_request:
    paths:
      - "backend/api/**"
      - "backend/scripts/export_openapi.py"
      - "frontend/openapi/**"
      - "frontend/src/lib/api/schema.d.ts"
      - ".github/workflows/contract.yml"
  push:
    branches: [main]
    paths:
      - "backend/api/**"
      - "frontend/openapi/**"
      - "frontend/src/lib/api/schema.d.ts"

permissions:
  contents: read

jobs:
  generated-contract-is-current:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql+psycopg://contract:contract@localhost:5432/contract
      DATABASE_API_URL: postgresql+psycopg://contract:contract@localhost:5432/contract
      DATABASE_WORKER_URL: postgresql+psycopg://contract:contract@localhost:5432/contract
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: python -m pip install ./backend
      - run: python backend/scripts/export_openapi.py frontend/openapi/sprintern-v1.json
      - run: npm ci
        working-directory: frontend
      - run: npm run generate:api-types
        working-directory: frontend
      - run: git diff --exit-code -- frontend/openapi frontend/src/lib/api/schema.d.ts
