services:
  migrate:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file: ${SPRINTERN_ENV_FILE:-.env.production}
    command: ["python", "-m", "alembic", "upgrade", "head"]
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file: ${SPRINTERN_ENV_FILE:-.env.production}
    command:
      - python
      - -m
      - uvicorn
      - api.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8010"
      - --workers
      - "1"
      - --no-proxy-headers
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports: ["8010:8010"]
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import os, urllib.parse, urllib.request; host=urllib.parse.urlparse(os.environ['PUBLIC_API_URL']).hostname; request=urllib.request.Request('http://127.0.0.1:8010/health/ready', headers={'Host': host}); urllib.request.urlopen(request, timeout=5)"
      interval: 30s
      timeout: 10s
      retries: 3

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file: ${SPRINTERN_ENV_FILE:-.env.production}
    command: ["python", "-m", "api.scheduler"]
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    deploy:
      replicas: 1

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    env_file: ${SPRINTERN_ENV_FILE:-.env.production}
    restart: unless-stopped
    ports: ["3000:3000"]
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/').then(response => { if (!response.ok) process.exit(1) }).catch(() => process.exit(1))"
      interval: 30s
      timeout: 10s
      retries: 3
