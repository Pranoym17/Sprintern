services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_DB: sprintern
      POSTGRES_USER: sprintern
      POSTGRES_PASSWORD: sprintern_dev
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sprintern -d sprintern"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql
  postgres-test:
    image: postgres:18
    profiles: ["test"]
    environment:
      POSTGRES_DB: sprintern_test
      POSTGRES_USER: sprintern_test
      POSTGRES_PASSWORD: sprintern_test
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sprintern_test -d sprintern_test"]
      interval: 5s
      timeout: 5s
      retries: 10
    tmpfs:
      - /var/lib/postgresql

volumes:
  postgres_data:
